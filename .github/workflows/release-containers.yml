name: Release Containers

on:
  release:
    types:
      - published
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_SHA: ${{ github.sha }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          SERVICE: ${{ matrix.service }}
        run: |
          owner=$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          repo=$(printf '%s' "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          short_sha=$(printf '%s' "$GIT_SHA" | cut -c1-7)
          if [ "$EVENT_NAME" = "release" ]; then
            raw_version="$RELEASE_TAG"
            publish_version=true
            if [ "$PRERELEASE" = "true" ]; then
              publish_latest=false
            else
              publish_latest=true
            fi
          else
            raw_version=""
            publish_version=false
            case "$COMMIT_MESSAGE" in
              *"Release "*)
                raw_version="${COMMIT_MESSAGE#*Release }"
                raw_version="${raw_version%%$'\n'*}"
                raw_version="${raw_version%% *}"
                if [ -n "$raw_version" ]; then
                  publish_version=true
                fi
                ;;
            esac
            publish_latest=true
          fi
          if [ "$publish_version" = "true" ]; then
            case "$raw_version" in
              v*) version="$raw_version" ;;
              *) version="v$raw_version" ;;
            esac
            version_label="$version"
          else
            version=""
            version_label="sha-$short_sha"
          fi
          echo "image=ghcr.io/${owner}/${repo}-${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_label=$version_label" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$publish_latest" >> "$GITHUB_OUTPUT"
          echo "publish_version=$publish_version" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }},enable=${{ steps.prep.outputs.publish_version == 'true' }}
            type=sha
            type=raw,value=latest,enable=${{ steps.prep.outputs.publish_latest == 'true' }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }} ${{ matrix.service }}
            org.opencontainers.image.description=Release image for the ${{ matrix.service }} service in ${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version_label }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
