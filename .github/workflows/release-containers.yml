name: Release Containers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Install BFF dependencies
        working-directory: bff
        run: npm ci

      - name: Lint BFF
        working-directory: bff
        run: npm run lint

      - name: Test BFF
        working-directory: bff
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test frontend
        working-directory: frontend
        run: npm test

  publish:
    name: Publish ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: bff
            context: .
            dockerfile: ./bff/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points to main
        id: verify_main
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag $GITHUB_REF_NAME does not point to a commit on main. Skipping publish."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: steps.verify_main.outputs.is_main == 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: steps.verify_main.outputs.is_main == 'true'

      - name: Prepare image name
        id: prep
        if: steps.verify_main.outputs.is_main == 'true'
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
        run: |
          owner=$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          repo=$(printf '%s' "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          case "$REF_NAME" in
            v*) version="$REF_NAME" ;;
            *) version="v$REF_NAME" ;;
          esac
          echo "image=ghcr.io/${owner}/${repo}-${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_label=$version" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        if: steps.verify_main.outputs.is_main == 'true'
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }} ${{ matrix.service }}
            org.opencontainers.image.description=Release image for the ${{ matrix.service }} service in ${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version_label }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        if: steps.verify_main.outputs.is_main == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        if: steps.verify_main.outputs.is_main == 'true'
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
