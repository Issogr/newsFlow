services:
  backend:
    build: ./backend
    container_name: news-aggregator-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - OLLAMA_API_URL=http://ipex-llm:11434/api
      - OLLAMA_MODEL=gemma3:1b
      # Variabili di ottimizzazione
      - OLLAMA_TIMEOUT=3000         # Timeout per chiamate a Ollama in ms
      - USE_OLLAMA=true             # Imposta a 'false' per disabilitare Ollama completamente
      - MAX_ARTICLES_PER_SOURCE=30  # Numero massimo di articoli da elaborare per fonte
      - RSS_MAX_RETRIES=5           # Tentativi di retry per problemi DNS
      - RSS_RETRY_DELAY=2000        # Tempo iniziale tra retry in ms
      - RSS_TIMEOUT=15000           # Timeout per le richieste RSS in ms
      - SERVER_TIMEOUT=60000        # Timeout del server in ms
      - LOG_LEVEL=info              # Livello di logging (debug, info, warn, error)
      - MIN_UPDATE_INTERVAL=60000   # Intervallo minimo per aggiornamenti automatici
      # Configurazioni WebSocket 
      - WS_PING_TIMEOUT=60000       # Timeout per ping WebSocket (ms)
      - WS_PING_INTERVAL=25000      # Intervallo tra ping WebSocket (ms)
    volumes:
      - ./backend/logs:/usr/src/app/logs:rw
      - ./backend/data:/usr/src/app/data:rw
    networks:
      - ollama-network
      - app-network
    dns:
      - 8.8.8.8       # Google DNS primario
      - 1.1.1.1       # Cloudflare DNS
      - 9.9.9.9       # Quad9 DNS (aggiunto per affidabilità)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: news-aggregator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
  ollama-network:
    external: true
    name: ollama-network