services:
  init-permissions:
    image: alpine:3.20
    user: "0:0"
    command: >
      sh -c "mkdir -p /mnt/backend-data /mnt/bff-data &&
      chown -R 1001:1001 /mnt/backend-data &&
      chown -R 1000:1000 /mnt/bff-data &&
      chmod -R u+rwX,g+rwX /mnt/backend-data /mnt/bff-data"
    volumes:
      - ./backend/data:/mnt/backend-data:rw,z
      - bff-data:/mnt/bff-data:rw
    restart: "no"

  backend:
    build: ./backend
    container_name: newsflow-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - INTERNAL_PROXY_TOKEN=${INTERNAL_PROXY_TOKEN:?INTERNAL_PROXY_TOKEN must be set}
      - INTERNAL_SERVICE_NAME=${INTERNAL_SERVICE_NAME:-bff}
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,@local-network
      - TRUST_PROXY=true
      - APP_BASE_URL=http://localhost
      - NEWS_DB_PATH=/usr/src/app/data/news.db
      - ADMIN_USERNAME=admin
      # Performance tuning variables
      - MAX_ARTICLES_PER_SOURCE=25  # Maximum number of articles to process per source
      - RSS_MAX_RETRIES=5           # Retry attempts for DNS-related issues
      - RSS_RETRY_DELAY=2000        # Initial retry delay in ms
      - RSS_TIMEOUT=15000           # Timeout for RSS requests in ms
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-qwen/qwen3.5-9b}
      - AI_TOPIC_DETECTION_ENABLED=${AI_TOPIC_DETECTION_ENABLED:-auto}
      - AI_TOPIC_BATCH_SIZE=${AI_TOPIC_BATCH_SIZE:-4}
      - AI_TOPIC_BATCH_CONCURRENCY=${AI_TOPIC_BATCH_CONCURRENCY:-1}
      - AI_TOPIC_MAX_ARTICLES_PER_REFRESH=${AI_TOPIC_MAX_ARTICLES_PER_REFRESH:-160}
      - AI_TOPIC_REQUEST_TIMEOUT_MS=${AI_TOPIC_REQUEST_TIMEOUT_MS:-30000}
      - AI_TOPIC_DEBUG_LOG_ARTICLES=${AI_TOPIC_DEBUG_LOG_ARTICLES:-false}
      - SERVER_TIMEOUT=60000        # Server timeout in ms
      - LOG_LEVEL=info              # Logging level (debug, info, warn, error)
      - SCRAPE_INTERVAL_MS=900000   # Balanced scraping interval (15 min)
      - SOURCE_REFRESH_ACTIVE_WINDOW_MINUTES=${SOURCE_REFRESH_ACTIVE_WINDOW_MINUTES:-5}
      - ARTICLE_RETENTION_HOURS=24  # Delete articles and cache entries older than 24 hours
      - MAX_SCAN_ARTICLES=600       # Maximum number of articles to scan for grouped queries
      # WebSocket configuration
      - WS_PING_TIMEOUT=60000       # WebSocket ping timeout (ms)
      - WS_PING_INTERVAL=25000      # Interval between WebSocket pings (ms)
    volumes:
      - ./backend/data:/usr/src/app/data:rw,z
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    container_name: newsflow-bff
    ports:
      - "80:80"
    environment:
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - INTERNAL_PROXY_TOKEN=${INTERNAL_PROXY_TOKEN:?INTERNAL_PROXY_TOKEN must be set}
      - BFF_SESSION_SECRET=${BFF_SESSION_SECRET:?BFF_SESSION_SECRET must be set}
      - INTERNAL_SERVICE_NAME=${INTERNAL_SERVICE_NAME:-bff}
      - BACKEND_BASE_URL=http://backend:5000
      - APP_BASE_URL=http://localhost
      - TRUST_PROXY=true
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    volumes:
      - bff-data:/app/bff/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  bff-data:
