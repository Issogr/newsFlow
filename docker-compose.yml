services:
  init-permissions:
    image: alpine:3.20
    user: "0:0"
    command: >
      sh -c "mkdir -p /mnt/data &&
      chown -R 1001:1001 /mnt/data &&
      chmod -R u+rwX,g+rwX /mnt/data"
    volumes:
      - ./backend/data:/mnt/data:rw,z
    restart: "no"

  backend:
    build: ./backend
    container_name: news-aggregator-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,@local-network
      - TRUST_PROXY=true
      - APP_BASE_URL=http://localhost
      - NEWS_DB_PATH=/usr/src/app/data/news.db
      - ADMIN_USERNAME=admin
      # Variabili di ottimizzazione
      - MAX_ARTICLES_PER_SOURCE=25  # Numero massimo di articoli da elaborare per fonte
      - RSS_MAX_RETRIES=5           # Tentativi di retry per problemi DNS
      - RSS_RETRY_DELAY=2000        # Tempo iniziale tra retry in ms
      - RSS_TIMEOUT=15000           # Timeout per le richieste RSS in ms
      - SERVER_TIMEOUT=60000        # Timeout del server in ms
      - LOG_LEVEL=info              # Livello di logging (debug, info, warn, error)
      - SCRAPE_INTERVAL_MS=300000   # Intervallo scraping real-time-ish (5 min)
      - ARTICLE_RETENTION_HOURS=24  # Elimina articoli e cache piu vecchi di 24 ore
      - MAX_SCAN_ARTICLES=600       # Massimo numero di articoli da scansionare per query raggruppata
      # Configurazioni WebSocket 
      - WS_PING_TIMEOUT=60000       # Timeout per ping WebSocket (ms)
      - WS_PING_INTERVAL=25000      # Intervallo tra ping WebSocket (ms)
    volumes:
      - ./backend/data:/usr/src/app/data:rw,z
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: news-aggregator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
