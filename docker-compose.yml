services:
  backend:
    build: ./backend
    container_name: news-aggregator-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - OLLAMA_API_URL=http://ipex-llm:11434/api
      - OLLAMA_MODEL=gemma3:1b
      # Variabili di ottimizzazione
      - OLLAMA_TIMEOUT=3000         # Timeout per chiamate a Ollama in ms
      - USE_OLLAMA=true             # Imposta a 'false' per disabilitare Ollama completamente
      - MAX_ARTICLES_PER_SOURCE=10  # Numero massimo di articoli da elaborare per fonte
      - RSS_MAX_RETRIES=5           # Aumentato a 5 tentativi per problemi DNS
      - RSS_RETRY_DELAY=2000        # Aumentato a 2 secondi per dare più tempo alla risoluzione DNS
      - SERVER_TIMEOUT=60000        # Timeout del server in ms
      - LOG_LEVEL=info              # Livello di logging (debug, info, warn, error)
    volumes:
      - ./backend/logs:/usr/src/app/logs
    networks:
      - ollama-network
      - app-network
    dns:
      - 8.8.8.8       # Google DNS primario
      - 1.1.1.1       # Cloudflare DNS
      - 9.9.9.9       # Quad9 DNS (aggiunto per affidabilità)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: news-aggregator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
      - ollama-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ollama-network:
    external: true
    name: ollama-network
  app-network:
    driver: bridge