# WebSocket configuration - deve essere nel contesto http
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=public_api_per_ip:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=public_api_conn_per_ip:10m;

server {
    listen 80;
    server_name localhost;
    server_tokens off;  # Non esporre la versione di NGINX nelle intestazioni

    root /usr/share/nginx/html;
    index index.html;
    error_page 413 = @payload_too_large;

    # Configurazioni di sicurezza
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:; frame-src 'none'; object-src 'none'; upgrade-insecure-requests;" always;
    
    # Aumenta il buffer per impedire l'overflow del buffer
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 16m;
    
    # Serve static files con una cache di lunga durata
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }
    
    # Endpoint health check per il container
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Serve l'applicazione React
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /api {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /api/ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ^~ /api/public/ {
        limit_req zone=public_api_per_ip burst=20 nodelay;
        limit_conn public_api_conn_per_ip 20;
        limit_req_status 429;
        limit_conn_status 429;

        proxy_pass http://backend:5000/api/public/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location ^~ /api/ {
        return 404;
    }

    # Proxy internal app API requests to backend
    location /internal-api/ {
        proxy_pass http://backend:5000/internal-api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s; # Aumentato per WebSocket
    }

    location @payload_too_large {
        default_type application/json;
        return 413 '{"error":{"message":"Attachments must be 12 MB or smaller.","code":"INVALID_FEEDBACK_IMAGE"}}';
    }
    
    # Proxy WebSocket connections to backend
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for WebSockets - ridotti da 24h a valori più ragionevoli
        proxy_read_timeout 3600s;    # 1h invece di 24h
        proxy_send_timeout 600s;     # 10 minuti
        proxy_connect_timeout 30s;   # Connessione iniziale
    }
    
    # Gestione errori
    error_page 404 /index.html;
    
    # Timeout di connessione client
    client_header_timeout 60s;
    client_body_timeout 60s;
    keepalive_timeout 75s;
    send_timeout 60s;
}
